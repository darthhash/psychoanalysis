steps:
  # Build & push backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/lacanist-api', '-f', 'Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lacanist-api']

  # Build & push frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/lacanist-web', '-f', 'Dockerfile.frontend', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lacanist-web']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lacanist-api'
      - '--image=gcr.io/$PROJECT_ID/lacanist-api'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--set-env-vars=OPENROUTER_API_KEY=${_OPENROUTER_API_KEY},DATABASE_URL=${_DATABASE_URL},JWT_SECRET=${_JWT_SECRET}'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lacanist-web'
      - '--image=gcr.io/$PROJECT_ID/lacanist-web'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _OPENROUTER_API_KEY: ''
  _DATABASE_URL: ''
  _JWT_SECRET: ''
